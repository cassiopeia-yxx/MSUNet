# general settings
name: MUWNet
model_type: MUWNetModel
num_gpu: 4
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    name: LOLBlurDataset_Train
    type: PairedImageDataset
    dataroot_gt: /home/data/dupf/ddd/LOLBlur/train/high_sharp_scaled
    dataroot_lq: /home/data/dupf/ddd/LOLBlur/train/low_blur_noise
    filename_tmpl: '{}'
    io_backend:
      type: disk

    # mean: [0.5, 0.5, 0.5]
    # std: [0.5, 0.5, 0.5]
    use_flip: true
    use_rot: true
    crop_size: 256

    use_shuffle: true
    batch_size_per_gpu: &bsz 2
    num_worker_per_gpu: 4
    dataset_enlarge_ratio: 100
    prefetch_mode: cpu
    num_prefetch_queue: 4

  val:
    name: LOLBlurDataset_Test
    type: PairedImageDataset
    dataroot_gt: /home/data/dupf/ddd/LOLBlur/test/high_sharp_scaled
    dataroot_lq: /home/data/dupf/ddd/LOLBlur/test/low_blur_noise
    io_backend:
      type: disk

    # mean: [0.5, 0.5, 0.5]
    # std: [0.5, 0.5, 0.5]

# network structures
network_g:
  type: MUWNet
  n_feat: 32
  nums_stage: 5

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~
  models: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]


  scheduler:
    type: CosineAnnealingRestartLR
    periods: [500000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 500000
  warmup_iter: -1

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  fft_opt:
    type: FFTLoss
    loss_weight: 0.1

#  edge_opt:
#    type: EdgeLoss
#    loss_weight: 0.05
#
  # perceptual_opt:
  #   type: PerceptualLoss
  #   layer_weights:
  #     'conv1_2': 1
  #     'conv2_2': 1
  #     'conv3_4': 1
  #     'conv4_4': 1
  #   vgg_type: vgg19
  #   use_input_norm: true
  #   perceptual_weight: 0.01
  #   style_weight: 0
  #   range_norm: true
  #   criterion: l1
  
  # use_side_loss: false
  # side_loss_weight: 0.8
  # init_weights: false

# validation settings
val:
  val_freq: !!float 2e4
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 2e4
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

# cassiopeia
# dist training settings
dist_params:
  backend: nccl
  # port: 29520
